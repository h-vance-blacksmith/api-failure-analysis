apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-failure-lab
  labels:
    app: failure-analysis
spec:
  replicas: 3
  selector:
    matchLabels:
      app: failure-analysis
  template:
    metadata:
      labels:
        app: failure-analysis
    spec:
      containers:
      - name: api-analysis
        image: harrison-vc/api-failure-analysis:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-failure-service
spec:
  selector:
    app: failure-analysis
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
